<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Voice & Board Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .whiteboard-surface {
            background-color: #1a202c; /* Dark Slate */
            color: #f7fafc;
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Chalkboard feel */
            min-height: 500px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .chalk-text h2 { color: #63b3ed; border-bottom: 1px dashed #4a5568; margin-bottom: 10px; }
        .chalk-text ul { list-style-type: square; padding-left: 20px; }
    </style>
</head>
<body class="bg-gray-200 min-h-screen">
    <div class="max-w-6xl mx-auto py-10 px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            
            <div class="md:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="font-bold text-lg mb-2">Tutor Input</h3>
                    <textarea id="userInput" class="w-full p-2 border rounded h-32 text-sm" placeholder="Ask me anything..."></textarea>
                    <button onclick="send()" class="w-full bg-indigo-600 text-white py-2 rounded mt-2 hover:bg-indigo-700">Send Question</button>
                    <button id="mic" onclick="startSpeech()" class="w-full border-2 border-indigo-600 text-indigo-600 py-2 rounded mt-2 hover:bg-indigo-50">🎤 Use Microphone</button>
                </div>
                <div class="text-xs text-gray-500 italic text-center">
                    Tutor will write on the board and speak simultaneously.
                </div>
            </div>

            <div class="md:col-span-3">
                <div id="board" class="whiteboard-surface rounded-xl p-10 chalk-text text-xl overflow-y-auto">
                    ## Hello! 
                    Ask me a question and I'll start teaching.
                </div>
            </div>

        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const board = document.getElementById('board');
        
        // Handling AI Messages
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === "whiteboard") {
                // Use marked to render markdown into HTML
                board.innerHTML = marked.parse(msg.data);
            } 
            if (msg.type === "voice") {
                speak(msg.data);
            }
        };

        // Text-to-Speech
        function speak(text) {
            window.speechSynthesis.cancel(); // Stop any current speech
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.1; // Slightly higher/friendly pitch
            utterance.rate = 0.95; // Clear pacing
            window.speechSynthesis.speak(utterance);
        }

        // Voice Input (Speech Recognition)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        function startSpeech() {
            recognition.start();
            document.getElementById('mic').innerText = "Listening...";
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('userInput').value = transcript;
            send();
        };

        recognition.onend = () => {
            document.getElementById('mic').innerText = "🎤 Use Microphone";
        };

        function send() {
            const input = document.getElementById('userInput').value;
            if (input.trim()) {
                ws.send(JSON.stringify({ message: input }));
                document.getElementById('userInput').value = "";
            }
        }
    </script>
</body>
</html>
